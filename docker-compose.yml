version: '3.8'

services:
  nexos-backend:
    build: .
    container_name: nexos-backend
    ports:
      - "8080:8080"
    volumes:
      - ./cloud_data:/app/cloud_data
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - PORT=8080
      - NODE_ENV=production
    restart: unless-stopped
